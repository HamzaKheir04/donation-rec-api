<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>توصيات المنتجات</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .header {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 14px;
      color: #888;
    }
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      direction: ltr;
      transition: border 0.2s;
    }
    input:focus { border-color: #4f46e5; }
    button {
      padding: 10px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3730a3; }
    .error {
      background: #fff0f0;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      color: #dc2626;
      font-size: 14px;
      margin-bottom: 1rem;
    }
    .loading {
      text-align: center;
      padding: 2rem;
      color: #888;
      font-size: 14px;
    }
    .result-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
    }
    .card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 10px;
    }
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .card-info { display: flex; align-items: center; gap: 12px; }
    .rank {
      background: #ede9fe;
      color: #5b21b6;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }
    .product-name { font-size: 14px; font-weight: 600; color: #1a1a2e; }
    .category-name { font-size: 12px; color: #888; margin-top: 2px; }
    .score { font-size: 17px; font-weight: 700; color: #16a34a; }
    .bar-bg {
      background: #e5e7eb;
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: #16a34a;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎁 توصيات المنتجات</h1>
      <p>أدخل رقم المستخدم لعرض التوصيات المخصصة له</p>
    </div>

    <div class="search-row">
      <input type="text" id="userInput" placeholder="مثال: 915552" onkeydown="if(event.key==='Enter') getRecommendations()" />
      <button onclick="getRecommendations()">🔍 بحث</button>
    </div>

    <div id="error" style="display:none;" class="error"></div>
    <div id="loading" style="display:none;" class="loading">⏳ جاري التحميل...</div>
    <div id="results" style="display:none;">
      <p class="result-label" id="resultLabel"></p>
      <div id="cards"></div>
    </div>
  </div>

  <script>
    async function getRecommendations() {
      const userId = document.getElementById('userInput').value.trim();
      const error = document.getElementById('error');
      const loading = document.getElementById('loading');
      const results = document.getElementById('results');
      const cards = document.getElementById('cards');

      error.style.display = 'none';
      results.style.display = 'none';
      cards.innerHTML = '';

      if (!userId) {
        error.textContent = 'الرجاء إدخال رقم المستخدم';
        error.style.display = 'block';
        return;
      }

      loading.style.display = 'block';

      try {
        const res = await fetch(`https://donation-rec-api.onrender.com/recommend?user_id=${userId}`);
        if (!res.ok) throw new Error('المستخدم غير موجود أو حدث خطأ في الخادم');
        const data = await res.json();

        loading.style.display = 'none';

        if (!data.recommendations || data.recommendations.length === 0) {
          error.textContent = 'لا توجد توصيات لهذا المستخدم';
          error.style.display = 'block';
          return;
        }

        document.getElementById('resultLabel').textContent = `${data.recommendations.length} توصيات للمستخدم #${data.user_id}`;

        data.recommendations.forEach((rec, i) => {
          const pct = (rec.score * 100).toFixed(1);
          const bar = Math.round(rec.score * 100);
          cards.innerHTML += `
            <div class="card">
              <div class="card-top">
                <div class="card-info">
                  <div class="rank">${i + 1}</div>
                  <div>
                    <div class="product-name">منتج #${rec.product_id}</div>
                    <div class="category-name">فئة #${rec.category_id}</div>
                  </div>
                </div>
                <div class="score">${pct}%</div>
              </div>
              <div class="bar-bg">
                <div class="bar-fill" style="width:${bar}%"></div>
              </div>
            </div>
          `;
        });

        results.style.display = 'block';
      } catch (e) {
        loading.style.display = 'none';
        error.textContent = e.message || 'حدث خطأ غير متوقع';
        error.style.display = 'block';
      }
    }
  </script>
</body>
</html>
